<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Список покупок</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6c5ce7;
  --primary-light: #a29bfe;
  --primary-dark: #5f3dc4;
  --accent: #fd79a8;
  --secondary: #00b894;
  --danger: #e17055;
  --bg-dark: #0a0a1a;
  --bg-card: #12122a;
  --bg-card-hover: #1a1a3e;
  --bg-input: #1e1e3f;
  --bg-sidebar: #0d0d20;
  --text-primary: #ffffff;
  --text-secondary: #b2b2d0;
  --text-muted: #6c6c8a;
  --border: #2a2a4a;
  --radius: 12px;
  --radius-lg: 20px;
  --font: 'Nunito', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { font-family:var(--font); background:var(--bg-dark); color:var(--text-primary); height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

.screen { display:none; flex-direction:column; height:100%; overflow:hidden; }
.screen.active { display:flex; }

.app-header { padding:14px 16px 12px; border-bottom:1px solid var(--border); background:rgba(10,10,26,0.95); backdrop-filter:blur(10px); flex-shrink:0; display:flex; align-items:center; gap:10px; }
.app-header .back-btn { width:34px; height:34px; background:var(--bg-input); border:1px solid var(--border); border-radius:10px; color:var(--text-secondary); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
.app-header h1 { font-size:17px; font-weight:800; background:linear-gradient(135deg,var(--primary-light),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; flex:1; }
.app-header .header-right { display:flex; gap:6px; flex-shrink:0; }

/* Loading */
.loading { position:fixed; inset:0; background:var(--bg-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:999; }
.loading.hidden { display:none; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
.loading p { color:var(--text-muted); font-size:14px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Lists */
.lists-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; -webkit-overflow-scrolling:touch; }
.list-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; animation:fadeInUp 0.3s ease; }
.list-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--primary),var(--accent)); opacity:0; transition:opacity 0.2s; }
.list-card:active { background:var(--bg-card-hover); }
.list-card:active::before { opacity:1; }
.list-card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.list-card-emoji { width:42px; height:42px; background:linear-gradient(135deg,rgba(108,92,231,0.25),rgba(253,121,168,0.15)); border:1px solid rgba(108,92,231,0.3); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.list-card-info { flex:1; min-width:0; }
.list-card-name { font-size:15px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.list-card-creator { font-size:11px; color:var(--text-muted); margin-top:2px; }
.list-card-del { width:30px; height:30px; background:transparent; border:none; color:var(--text-muted); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; transition:all 0.15s; }
.list-card-del:active { color:var(--danger); }
.progress-row { display:flex; align-items:center; gap:10px; }
.progress-bg { flex:1; height:5px; background:var(--bg-input); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:3px; transition:width 0.4s ease; }
.progress-label { font-size:11px; color:var(--text-muted); font-weight:700; flex-shrink:0; }

.empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; color:var(--text-muted); gap:10px; }
.empty-state .big { font-size:52px; }
.empty-state p { font-size:14px; line-height:1.6; }

/* Bottom sheet */
.bottom-sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; display:none; backdrop-filter:blur(4px); }
.bottom-sheet-overlay.open { display:block; }
.bottom-sheet { position:fixed; bottom:0; left:0; right:0; background:var(--bg-card); border-radius:var(--radius-lg) var(--radius-lg) 0 0; border-top:1px solid var(--border); padding:20px 16px 32px; z-index:101; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); }
.bottom-sheet-overlay.open .bottom-sheet { transform:translateY(0); }
.bottom-sheet h3 { font-size:16px; font-weight:800; margin-bottom:14px; text-align:center; }
.bottom-sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.bs-input { width:100%; background:var(--bg-input); border:2px solid var(--border); border-radius:var(--radius); color:var(--text-primary); font-family:var(--font); font-size:15px; padding:12px 14px; outline:none; transition:border-color 0.2s; margin-bottom:12px; }
.bs-input:focus { border-color:var(--primary); }
.bs-input::placeholder { color:var(--text-muted); }

.btn-primary { width:100%; padding:13px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border:none; border-radius:var(--radius); color:white; font-family:var(--font); font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
.btn-primary:active { transform:scale(0.98); opacity:0.9; }
.fab { position:fixed; bottom:20px; right:16px; width:54px; height:54px; background:linear-gradient(135deg,var(--primary),var(--accent)); border:none; border-radius:16px; color:white; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(108,92,231,0.4); transition:all 0.2s; z-index:50; }
.fab:active { transform:scale(0.92); }

/* Detail */
.list-detail-body { flex:1; overflow-y:auto; padding:12px 14px 80px; -webkit-overflow-scrolling:touch; }
.detail-stats { display:flex; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.stat-chip { background:var(--bg-input); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:700; color:var(--text-muted); }
.stat-chip span { color:var(--primary-light); }
.cat-section { margin-bottom:18px; }
.cat-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); padding:0 2px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.cat-label::after { content:''; flex:1; height:1px; background:var(--border); }
.item-row { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:6px; cursor:pointer; transition:all 0.15s; animation:fadeInUp 0.2s ease; }
.item-row:active { background:var(--bg-card-hover); }
.item-row.bought { opacity:0.5; background:var(--bg-sidebar); }
.item-row.bought .item-name { text-decoration:line-through; color:var(--text-muted); }
.check-circle { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; transition:all 0.2s; }
.item-row.bought .check-circle { background:var(--secondary); border-color:var(--secondary); color:white; }
.item-info { flex:1; min-width:0; }
.item-name { font-size:14px; font-weight:600; }
.item-buyer { font-size:11px; color:var(--text-muted); margin-top:1px; }
.item-del { background:none; border:none; color:var(--text-muted); font-size:14px; cursor:pointer; padding:6px; border-radius:8px; transition:all 0.15s; }
.item-del:active { color:var(--danger); }

/* Add items */
.cats-grid { padding:12px 14px; display:grid; grid-template-columns:1fr 1fr; gap:8px; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
.cat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 12px; cursor:pointer; transition:all 0.15s; display:flex; flex-direction:column; gap:6px; }
.cat-card:active { background:var(--bg-card-hover); border-color:var(--primary); }
.cat-card .cat-emoji { font-size:26px; }
.cat-card .cat-name { font-size:12px; font-weight:700; color:var(--text-secondary); line-height:1.3; }
.cat-card .cat-count-badge { font-size:10px; font-weight:700; color:var(--primary-light); background:rgba(108,92,231,0.15); border-radius:20px; padding:2px 8px; width:fit-content; display:none; }
.cat-card.has-items .cat-count-badge { display:block; }

/* Cat items */
.items-scroll { flex:1; overflow-y:auto; padding:12px 14px 80px; -webkit-overflow-scrolling:touch; }
.item-chip-grid { display:flex; flex-wrap:wrap; gap:8px; }
.item-chip { background:var(--bg-input); border:1.5px solid var(--border); border-radius:22px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s; color:var(--text-secondary); user-select:none; }
.item-chip.selected { background:rgba(108,92,231,0.2); border-color:var(--primary); color:var(--primary-light); }
.item-chip:active { transform:scale(0.95); }

.custom-add-row { display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg-dark); }
.custom-add-row input { flex:1; background:var(--bg-input); border:2px solid var(--border); border-radius:var(--radius); color:var(--text-primary); font-family:var(--font); font-size:14px; padding:10px 12px; outline:none; transition:border-color 0.2s; }
.custom-add-row input:focus { border-color:var(--primary); }
.custom-add-row input::placeholder { color:var(--text-muted); }
.custom-add-row button { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border:none; border-radius:var(--radius); color:white; font-size:18px; width:42px; height:42px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }

.actions-row { display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg-dark); }
.btn-sm { flex:1; padding:10px 8px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-input); color:var(--text-secondary); font-family:var(--font); font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; text-align:center; }
.btn-sm:active { background:var(--border); }
.btn-sm.danger:active { background:rgba(225,112,85,0.15); color:var(--danger); border-color:var(--danger); }

@keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Загрузка...</p>
</div>

<!-- SCREEN: LISTS -->
<div class="screen active" id="screen-lists">
  <div class="app-header">
    <h1>🛒 Списки покупок</h1>
  </div>
  <div class="lists-body" id="lists-body"></div>
  <button class="fab" onclick="openNewList()">＋</button>
</div>

<!-- SCREEN: DETAIL -->
<div class="screen" id="screen-detail">
  <div class="app-header">
    <button class="back-btn" onclick="goTo('screen-lists',renderLists)">←</button>
    <h1 id="detail-title">Список</h1>
    <div class="header-right">
      <button class="back-btn" onclick="openAddItems()" style="font-size:20px">＋</button>
    </div>
  </div>
  <div class="detail-stats" id="detail-stats"></div>
  <div class="list-detail-body" id="list-detail-body"></div>
  <div class="actions-row">
    <button class="btn-sm" onclick="clearBought()">🧹 Убрать купленные</button>
    <button class="btn-sm danger" onclick="deleteCurrentList()">❌ Удалить список</button>
  </div>
</div>

<!-- SCREEN: ADD (categories) -->
<div class="screen" id="screen-add">
  <div class="app-header">
    <button class="back-btn" onclick="goTo('screen-detail',renderDetail)">←</button>
    <h1>➕ Добавить товары</h1>
  </div>
  <div class="cats-grid" id="cats-grid"></div>
  <div class="custom-add-row">
    <input type="text" id="global-custom-input" placeholder="✏️ Свой товар..." maxlength="50"/>
    <button onclick="addGlobalCustom()">＋</button>
  </div>
</div>

<!-- SCREEN: CAT ITEMS -->
<div class="screen" id="screen-cat">
  <div class="app-header">
    <button class="back-btn" onclick="goTo('screen-add',renderCatsGrid)">←</button>
    <h1 id="cat-screen-title">Категория</h1>
  </div>
  <div class="items-scroll">
    <div class="item-chip-grid" id="cat-items-grid"></div>
  </div>
</div>

<!-- BOTTOM SHEET: NEW LIST -->
<div class="bottom-sheet-overlay" id="bs-overlay" onclick="closeNewList()">
  <div class="bottom-sheet" onclick="event.stopPropagation()">
    <div class="bottom-sheet-handle"></div>
    <h3>Новый список</h3>
    <input class="bs-input" id="new-list-name" placeholder="Название — «Пятница», «IKEA»..." maxlength="40"/>
    <button class="btn-primary" onclick="createList()">✓ Создать</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0a1a'); tg.setBackgroundColor('#0a0a1a'); }

const userName = tg?.initDataUnsafe?.user?.first_name || 'Пользователь';
const chatId = tg?.initDataUnsafe?.chat?.id || tg?.initDataUnsafe?.user?.id || 'test';

// !! ЗАМЕНИ НА URL СВОЕГО API !!
const API = 'https://chatverse-r3y1.onrender.com/api/shopping';

const CATEGORIES = [
  { id:'dairy',   emoji:'🥛', name:'Молочная продукция',  items:['Молоко','Кефир','Ряженка','Йогурт','Сметана','Творог','Сыр','Масло сливочное','Сливки','Глазированные сырки','Сгущёнка'] },
  { id:'bread',   emoji:'🍞', name:'Хлеб и выпечка',      items:['Хлеб чёрный','Хлеб белый','Батон','Багет','Лаваш','Булочки','Круассаны','Пряники','Печенье','Сухари'] },
  { id:'meat',    emoji:'🥩', name:'Мясо и колбасы',      items:['Говядина','Свинина','Курица','Индейка','Фарш','Пельмени','Котлеты','Сосиски','Колбаса варёная','Колбаса копчёная','Ветчина','Тушёнка'] },
  { id:'fish',    emoji:'🐟', name:'Рыба и морепродукты', items:['Рыба мороженая','Сельдь','Скумбрия','Семга','Форель','Икра красная','Шпроты','Тунец','Креветки','Кальмары','Крабовые палочки'] },
  { id:'veggies', emoji:'🥦', name:'Овощи',               items:['Картофель','Морковь','Лук','Помидоры','Огурцы','Перец','Чеснок','Свёкла','Капуста','Кабачки','Баклажаны'] },
  { id:'fruits',  emoji:'🍎', name:'Фрукты и зелень',     items:['Яблоки','Бананы','Апельсины','Лимоны','Груши','Виноград','Укроп','Петрушка','Кинза','Базилик'] },
  { id:'grains',  emoji:'🌾', name:'Бакалея и крупы',     items:['Гречка','Рис','Овсянка','Пшено','Макароны','Спагетти','Мука','Сахар','Соль','Масло подсолнечное','Масло оливковое'] },
  { id:'sweets',  emoji:'🍫', name:'Сладости',            items:['Шоколад','Конфеты','Зефир','Мармелад','Халва','Вафли','Торт','Мёд','Варенье'] },
  { id:'tea',     emoji:'☕', name:'Чай, кофе, специи',   items:['Чай чёрный','Чай зелёный','Кофе молотый','Кофе растворимый','Какао','Перец чёрный','Лавровый лист','Корица','Куркума','Уксус'] },
  { id:'drinks',  emoji:'🥤', name:'Напитки',             items:['Вода','Сок','Газировка','Квас','Морс','Компот','Энергетик'] },
  { id:'frozen',  emoji:'🧊', name:'Заморозка',           items:['Овощные смеси','Ягоды','Грибы','Пицца','Блинчики','Вареники','Мороженое'] },
  { id:'alcohol', emoji:'🍷', name:'Алкоголь',            items:['Пиво','Вино красное','Вино белое','Шампанское','Водка','Коньяк','Виски'] },
  { id:'chem',    emoji:'🧴', name:'Бытовая химия',       items:['Порошок','Средство для посуды','Чистящее','Туалетная бумага','Салфетки','Шампунь','Мыло','Зубная паста'] },
  { id:'other',   emoji:'🛍', name:'Разное',              items:['Корм для животных','Батарейки','Спички','Пакеты','Фольга'] },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

let lists = [];
let currentList = null;
let currentCatId = null;

// ── API helpers ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

function showLoading(v) {
  document.getElementById('loading').classList.toggle('hidden', !v);
}

// ── Navigation ──
function goTo(screenId, renderFn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  if (renderFn) renderFn();
}

// ── Lists ──
async function renderLists() {
  showLoading(true);
  try {
    lists = await api('GET', `/api/lists/${chatId}`);
  } catch(e) { lists = []; }
  showLoading(false);

  const body = document.getElementById('lists-body');
  if (!lists.length) {
    body.innerHTML = `<div class="empty-state"><div class="big">🛒</div><p>Нет списков покупок.<br>Нажми <b>+</b> чтобы создать!</p></div>`;
    return;
  }
  const emojis = ['🛒','🧺','📋','🏪','🏬','🏡'];
  body.innerHTML = lists.map(lst => {
    const items = Object.values(lst.items || {});
    const total = items.length;
    const bought = items.filter(i => i.bought).length;
    const pct = total ? Math.round(bought/total*100) : 0;
    const emoji = emojis[Math.abs((lst.list_id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)) % emojis.length];
    return `<div class="list-card" onclick="openList('${lst.list_id}')">
      <div class="list-card-top">
        <div class="list-card-emoji">${emoji}</div>
        <div class="list-card-info">
          <div class="list-card-name">${lst.name}</div>
          <div class="list-card-creator">создал(а) ${lst.creator} · ${total} товаров</div>
        </div>
        <button class="list-card-del" onclick="event.stopPropagation();deleteList('${lst.list_id}')">✕</button>
      </div>
      <div class="progress-row">
        <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">${bought}/${total}</div>
      </div>
    </div>`;
  }).join('');
}

async function openList(listId) {
  currentList = lists.find(l => l.list_id === listId);
  renderDetail();
  goTo('screen-detail');
}

// ── New list ──
function openNewList() {
  document.getElementById('bs-overlay').classList.add('open');
  setTimeout(() => document.getElementById('new-list-name').focus(), 300);
}
function closeNewList() {
  document.getElementById('bs-overlay').classList.remove('open');
  document.getElementById('new-list-name').value = '';
}
async function createList() {
  const name = document.getElementById('new-list-name').value.trim();
  if (!name) return;
  const list_id = Date.now().toString(36);
  showLoading(true);
  const lst = await api('POST', `/api/lists/${chatId}`, { list_id, name, creator: userName });
  showLoading(false);
  lists.push(lst);
  closeNewList();
  currentList = lst;
  renderDetail();
  goTo('screen-detail');
}
document.getElementById('new-list-name').addEventListener('keydown', e => { if(e.key==='Enter') createList(); });

async function deleteList(listId) {
  if (!confirm('Удалить список?')) return;
  await api('DELETE', `/api/lists/${chatId}/${listId}`);
  lists = lists.filter(l => l.list_id !== listId);
  renderLists();
}

// ── Detail ──
function renderDetail() {
  if (!currentList) return;
  document.getElementById('detail-title').textContent = currentList.name;
  const items = Object.entries(currentList.items || {});
  const total = items.length;
  const bought = items.filter(([,v])=>v.bought).length;
  document.getElementById('detail-stats').innerHTML = `
    <div class="stat-chip">Всего: <span>${total}</span></div>
    <div class="stat-chip">Куплено: <span>${bought}</span></div>
    <div class="stat-chip">Осталось: <span>${total-bought}</span></div>`;

  if (!total) {
    document.getElementById('list-detail-body').innerHTML = `<div class="empty-state"><div class="big">📝</div><p>Список пуст.<br>Нажми <b>+</b> чтобы добавить товары.</p></div>`;
    return;
  }

  const groups = {};
  items.forEach(([key, val]) => {
    const cid = val.cat_id || 'other';
    groups[cid] = groups[cid] || [];
    groups[cid].push([key, val]);
  });

  let html = '';
  [...CATEGORIES.map(c=>c.id), 'custom'].forEach(cid => {
    if (!groups[cid]) return;
    const cat = CAT_MAP[cid];
    const label = cat ? `${cat.emoji} ${cat.name}` : '✏️ Свои товары';
    html += `<div class="cat-section"><div class="cat-label">${label}</div>`;
    groups[cid].forEach(([key, val]) => {
      const bc = val.bought ? 'bought' : '';
      const check = val.bought ? '✓' : '';
      const buyer = val.bought && val.buyer ? `<div class="item-buyer">Купил(а): ${val.buyer}</div>` : '';
      html += `<div class="item-row ${bc}" onclick="toggleBought('${key}')">
        <div class="check-circle">${check}</div>
        <div class="item-info"><div class="item-name">${val.name}</div>${buyer}</div>
        <button class="item-del" onclick="event.stopPropagation();removeItem('${key}')">✕</button>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('list-detail-body').innerHTML = html;
}

async function toggleBought(key) {
  showLoading(true);
  currentList = await api('POST', `/api/lists/${chatId}/${currentList.list_id}/buy`, { key, buyer: userName });
  showLoading(false);
  renderDetail();
  tg?.HapticFeedback?.impactOccurred('light');
}

async function removeItem(key) {
  showLoading(true);
  currentList = await api('DELETE', `/api/lists/${chatId}/${currentList.list_id}/item`, { key });
  showLoading(false);
  renderDetail();
}

async function clearBought() {
  showLoading(true);
  currentList = await api('POST', `/api/lists/${chatId}/${currentList.list_id}/clearbought`, {});
  showLoading(false);
  renderDetail();
}

async function deleteCurrentList() {
  if (!confirm(`Удалить список «${currentList.name}»?`)) return;
  await api('DELETE', `/api/lists/${chatId}/${currentList.list_id}`);
  lists = lists.filter(l => l.list_id !== currentList.list_id);
  currentList = null;
  renderLists();
  goTo('screen-lists');
}

// ── Add items ──
function openAddItems() {
  renderCatsGrid();
  goTo('screen-add');
}

function renderCatsGrid() {
  const currentItems = currentList?.items || {};
  document.getElementById('cats-grid').innerHTML = CATEGORIES.map(cat => {
    const count = Object.values(currentItems).filter(i=>i.cat_id===cat.id).length;
    return `<div class="cat-card ${count>0?'has-items':''}" onclick="openCat('${cat.id}')">
      <div class="cat-emoji">${cat.emoji}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count-badge">${count} выбрано</div>
    </div>`;
  }).join('');
}

function openCat(catId) {
  currentCatId = catId;
  const cat = CAT_MAP[catId];
  document.getElementById('cat-screen-title').textContent = `${cat.emoji} ${cat.name}`;
  renderCatItems();
  goTo('screen-cat');
}

function renderCatItems() {
  const cat = CAT_MAP[currentCatId];
  const currentItems = currentList?.items || {};
  document.getElementById('cat-items-grid').innerHTML = cat.items.map(item => {
    const key = `${currentCatId}::${item}`;
    const sel = key in currentItems ? 'selected' : '';
    return `<div class="item-chip ${sel}" onclick="toggleChip('${key}','${item.replace(/'/g,"\\'")}',this)">${item}</div>`;
  }).join('');
}

async function toggleChip(key, itemName, el) {
  const cat_id = currentCatId;
  currentList = await api('POST', `/api/lists/${chatId}/${currentList.list_id}/toggle`, {
    key, name: itemName, cat_id, added_by: userName
  });
  el.classList.toggle('selected', key in (currentList.items || {}));
  renderCatsGrid();
  tg?.HapticFeedback?.impactOccurred('light');
}

async function addGlobalCustom() {
  const input = document.getElementById('global-custom-input');
  const val = input.value.trim();
  if (!val) return;
  showLoading(true);
  currentList = await api('POST', `/api/lists/${chatId}/${currentList.list_id}/custom`, { name: val, added_by: userName });
  showLoading(false);
  input.value = '';
  renderCatsGrid();
  tg?.HapticFeedback?.notificationOccurred('success');
}
document.getElementById('global-custom-input').addEventListener('keydown', e => { if(e.key==='Enter') addGlobalCustom(); });

// ── Init ──
renderLists().then(() => goTo('screen-lists'));
</script>
</body>
</html>
